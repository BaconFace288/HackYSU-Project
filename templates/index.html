<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealSpace</title>
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // Apply theme immediately to prevent flash of unstyled content
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
</head>
<body>
    <div class="app-container">
        
        <!-- Top Header -->
        <header class="app-header">
            <div class="brand">
                <div class="brand-icon">⚡</div>
                <h1>HealSpace</h1>
            </div>
            <div class="user-profile">
                <div class="avatar">
                    <img src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff" alt="User Avatar">
                </div>
                <div class="user-info">
                    <h3>Loading...</h3>
                </div>
            </div>
        </header>

        <!-- Board / Feed View -->
        <main class="board-view" id="board-view">
            <div class="board-header">
                <h2>Community Support Feed</h2>
                <button class="btn-primary" onclick="window.openCreateModal()">
                    <span>+</span> New Post
                </button>
            </div>
            
            <!-- Posts will be injected here -->
            <div class="feed-container" id="feed-container">
                <!-- Example Skeleton Card (removed when real data loads) -->
                <div class="post-card">
                    <h3>Loading Feed...</h3>
                    <p>Connecting to Firebase FireStore to load community requests...</p>
                </div>
            </div>
        </main>

        <!-- Specific Chat Room View (Hidden by default) -->
        <main class="room-view" id="room-view">
            <header class="room-header">
                <button class="btn-back" onclick="window.closeRoom()">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
                <div class="room-header-info">
                    <h2 id="room-title">Loading Room...</h2>
                    <p id="room-host">Hosted by...</p>
                </div>
            </header>

            <div class="chat-area" id="messages-container">
                <!-- Messages inject here -->
            </div>

            <div class="input-area">
                <form id="chat-form" onsubmit="window.sendMessage(event)">
                    <div class="input-container">
                        <i class="fas fa-paperclip" style="color:var(--text-secondary); margin-right:12px; font-size: 1.2rem;"></i>
                        <input type="text" id="message-input" autocomplete="off" placeholder="Type a supportive message...">
                        <i class="far fa-smile" style="color:var(--text-secondary); margin:0 12px; font-size: 1.2rem;"></i>
                        <button type="submit" id="send-btn">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </form>
            </div>
        </main>

        <!-- Create Post Modal popup -->
        <div class="modal-overlay" id="create-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Create Support Request</h3>
                    <button class="btn-close" onclick="window.closeCreateModal()">×</button>
                </div>
                <form onsubmit="window.submitPost(event)">
                    <div class="form-group">
                        <label>Topic Title</label>
                        <input type="text" id="post-title" required placeholder="e.g., Seeking advice on exam stress">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="post-desc" required placeholder="Provide a little background on what you want to talk about..."></textarea>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; justify-content: center;">Post to Feed</button>
                </form>
            </div>
        </div>
    </div>
    <script type="module" src="/static/script.js"></script>
</body>
</html>
