<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealSpace - Settings</title>
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            align-items: center;
            justify-content: center;
        }
        .settings-container {
            width: 90%;
            max-width: 600px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }
        .settings-header {
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 10px;
        }
        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .setting-info h3 {
            font-size: 1.1rem;
            color: var(--text-primary);
            margin-bottom: 5px;
        }
        .setting-info p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 20px;
            width: 100%;
        }
        .logout-btn:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>
    <div class="settings-container">
        <div class="settings-header">
            <button class="back-btn" onclick="window.location.href='/'">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <h2>User Settings</h2>
        </div>
        
        <div class="setting-item">
            <div class="setting-info">
                <h3 id="settings-username">Loading...</h3>
                <p id="settings-email">Loading email...</p>
            </div>
            <div class="avatar" style="margin-right: 0;">
                <img id="settings-avatar" src="" style="width: 50px; height: 50px; border-radius: 50%;">
            </div>
        </div>

        <button class="logout-btn" id="logout-btn">Log Out</button>
    </div>

    <!-- We need a specific script to handle firebase auth here -->
    <script type="module">
        import { auth } from '/static/firebase.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('settings-username').textContent = user.displayName || 'Anonymous';
                document.getElementById('settings-email').textContent = user.email;
                const avatar = document.getElementById('settings-avatar');
                if (user.displayName) {
                    avatar.src = `https://ui-avatars.com/api/?name=${user.displayName}&background=6366f1&color=fff&rounded=true`;
                }
            } else {
                window.location.href = '/login';
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth);
        });
    </script>
</body>
</html>
