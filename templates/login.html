<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealSpace - Login</title>
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/login.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // Apply theme immediately to prevent flash
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
</head>
<body>
    <div class="login-container glass-panel">
        <div class="brand login-brand">
            <img src="/static/logo_leaf.png" alt="HealSpace Icon" class="logo">
            <h2>HealSpace</h2>
        </div>
        
        <p class="subtitle">Welcome to the global chat room</p>
        
        <div class="auth-box">
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>
            
            <div id="error-msg" class="error-banner" style="display: none;"></div>
            <div id="success-msg" class="success-banner" style="display: none;"></div>

            <!-- Login Form -->
            <form id="login-form" onsubmit="handleLogin(event)" class="auth-form">
                <div class="input-group">
                    <label for="login-username">Email</label>
                    <input type="email" id="login-username" required placeholder="Enter email">
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required placeholder="Enter password">
                </div>
                <button type="submit" class="primary-btn">Sign In</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" onsubmit="handleRegister(event)" class="auth-form" style="display: none;">
                <div class="input-group">
                    <label for="reg-username">Display Name</label>
                    <input type="text" id="reg-username" required placeholder="Choose a username">
                </div>
                <div class="input-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" required placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" required placeholder="Create a password">
                </div>
                <button type="submit" class="primary-btn outline-btn">Create Account</button>
            </form>
        </div>
    </div>

    <script type="module" src="/static/login.js"></script>
</body>
</html>
